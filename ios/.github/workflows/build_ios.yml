name: Build iOS IPA cho be Capy

on:
  workflow_dispatch: # Cái này giúp ông có cái nút bấm "Chạy" bằng tay trên GitHub

jobs:
  build_ios:
    name: Build unsigned IPA
    runs-on: macos-latest # Xài ké máy Mac xịn của GitHub

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build iOS (No Codesign)
        run: flutter build ios --release --no-codesign

      - name: Đóng gói thành file IPA
        run: |
          mkdir Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -qq -r WaterCapy.ipa Payload

      - name: Upload Artifact (Quăng file lên cho ông tải về)
        uses: actions/upload-artifact@v4
        with:
          name: WaterCapy-IPA
          path: WaterCapy.ipa