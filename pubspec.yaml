name: water_capy
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.5
  provider: ^6.1.5+1
  google_fonts: ^8.0.2
  lottie: ^3.3.2
  fl_chart: ^0.68.0
  flutter_local_notifications: ^21.0.0
  awesome_notifications: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/capy_4.png"
  min_sdk_size: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/